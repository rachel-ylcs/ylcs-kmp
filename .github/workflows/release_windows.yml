name: ReleaseWindows
on:
  push:
    tags:
      - 'windows*'
jobs:
  package-windows:
    name: Package Windows
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: gradle
          cache-dependency-path: |
            ./*.gradle*
            ./**/gradle-wrapper.properties

      - name: Debug Paths
        run: |
          echo "JAVA_HOME is: $JAVA_HOME"
          ls -l $JAVA_HOME/jmods/java.base.jmod

      - name: Set Classpath Environment
        run: |
          echo "CLASSPATH=$JAVA_HOME/lib/tools.jar:$JAVA_HOME/lib/dt.jar" >> $GITHUB_ENV
          echo "JAVA_MODS=$JAVA_HOME/jmods" >> $GITHUB_ENV

      - name: Setup MSVC
        uses: TheMrMilchmann/setup-msvc-dev@v4
        with:
          arch: x64
          export-path-to-vs: VS_PATH

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Build
        run: ./gradlew ylcs-app:desktopApp:desktopPublish