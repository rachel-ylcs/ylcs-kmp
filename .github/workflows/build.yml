name: Build

on:
  push:
    branches:
      - main
    tags-ignore:
      - '*'
    paths-ignore:
      - '**.md'
      - 'ylcs-docs/**'
      - 'design/**'
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'ylcs-docs/**'
      - 'design/**'

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      android: ${{ steps.filter.outputs.android }}
      ios: ${{ steps.filter.outputs.ios }}
      desktop: ${{ steps.filter.outputs.desktop }}
      web: ${{ steps.filter.outputs.web }}
      server: ${{ steps.filter.outputs.server }}
      modManager: ${{ steps.filter.outputs.modManager }}
      landpage: ${{ steps.filter.outputs.landpage }}
      gallery: ${{ steps.filter.outputs.gallery }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Detect File Changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            common: &common
              - 'gradle/**'
              - 'buildSrc/**'
              - 'ylcs-module/**/commonMain/**'
              - 'ylcs-app/cs/**'
              - 'ylcs-app/mod/**'
              - 'gradle.properties'
              - 'settings.gradle.kts'
              - 'build.gradle.kts'
              - 'libs.versions.toml'
            client: &client
              - *common
              - 'ylcs-app/app/**/commonMain/**'
              - 'ylcs-app/app/**/build.gradle.kts'
            android:
              - *client
              - 'ylcs-module/**/jvmMain/**'
              - 'ylcs-module/**/androidMain/**'
              - 'ylcs-app/app/**/jvmMain/**'
              - 'ylcs-app/app/**/androidMain/**'
              - 'ylcs-app/android-app/**'
            ios:
              - *client
              - 'ylcs-module/**/appleMain/**'
              - 'ylcs-module/**/iosMain/**'
              - 'ylcs-app/app/**/nativeInterop/**'
              - 'ylcs-app/app/**/appleMain/**'
              - 'ylcs-app/app/**/iosMain/**'
              - 'ylcs-app/iosApp/**'
            desktop:
              - *client
              - 'ylcs-module/**/jvmMain/**'
              - 'ylcs-module/**/desktopMain/**'
              - 'ylcs-app/app/**/jvmMain/**'
              - 'ylcs-app/app/**/desktopMain/**'
              - 'ylcs-app/desktop-app/**'
            web:
              - *client
              - 'ylcs-module/**/webMain/**'
              - 'ylcs-module/**/jsMain/**'
              - 'ylcs-module/**/wasmJsMain/**'
              - 'ylcs-app/app/**/webMain/**'
              - 'ylcs-app/app/**/jsMain/**'
              - 'ylcs-app/app/**/wasmJsMain/**'
              - 'ylcs-app/web-app/**'
            server:
              - *common
              - 'ylcs-app/server/**'
            modManager:
              - *common
              - 'ylcs-app/modManager/**'
            landpage:
              - *common
              - 'ylcs-app/landpage/**'
            gallery:
              - *common
              - 'ylcs-app/gallery/**'

  build-android:
    name: Build Android
    needs: changes
    if: ${{ needs.changes.outputs.android == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: oracle
          java-version: 25
          cache: gradle
          cache-dependency-path: |
            ./*.gradle*
            ./**/gradle-wrapper.properties

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build
        run: ./gradlew ylcs-app:android-app:androidPackage

  build-ios:
    name: Build iOS
    needs: changes
    if: ${{ needs.changes.outputs.ios == 'true' }}
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: oracle
          java-version: 25
          cache: gradle
          cache-dependency-path: |
            ./*.gradle*
            ./**/gradle-wrapper.properties

      - name: Build
        run: |
          ./gradlew ylcs-app:app:portal:generateDummyFramework
          ./gradlew ylcs-app:app:portal:podspec
          ./gradlew ylcs-app:app:portal:podInstall
          ./gradlew ylcs-app:app:portal:linkPodDebugFrameworkIosArm64

  build-desktop:
    name: Build Desktop
    needs: changes
    if: ${{ needs.changes.outputs.desktop == 'true' }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: oracle
          java-version: 25
          cache: gradle
          cache-dependency-path: |
            ./*.gradle*
            ./**/gradle-wrapper.properties

      - name: Setup MSVC
        if: runner.os == 'Windows'
        uses: TheMrMilchmann/setup-msvc-dev@v4
        with:
          arch: x64
          export-path-to-vs: VS_PATH

      - name: Build
        run: ./gradlew ylcs-app:desktop-app:desktopJar

  build-web:
    name: Build Web
    needs: changes
    if: ${{ needs.changes.outputs.web == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: oracle
          java-version: 25
          cache: gradle
          cache-dependency-path: |
            ./*.gradle*
            ./**/gradle-wrapper.properties

      - name: Build
        run: ./gradlew ylcs-app:web-app:wasmJsJar

  build-server:
    name: Build Server
    needs: changes
    if: ${{ needs.changes.outputs.server == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: oracle
          java-version: 25
          cache: gradle
          cache-dependency-path: |
            ./*.gradle*
            ./**/gradle-wrapper.properties

      - name: Build
        run: ./gradlew ylcs-app:server:serverPublish

  build-modManager:
    name: Build Mod Manager
    needs: changes
    if: ${{ needs.changes.outputs.modManager == 'true' }}
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: oracle
          java-version: 25
          cache: gradle
          cache-dependency-path: |
            ./*.gradle*
            ./**/gradle-wrapper.properties

      - name: Setup MSVC
        uses: TheMrMilchmann/setup-msvc-dev@v4
        with:
          arch: x64
          export-path-to-vs: VS_PATH

      - name: Build
        run: ./gradlew ylcs-app:mod-manager:desktopJar

  build-landpage:
    name: Build Landpage
    needs: changes
    if: ${{ needs.changes.outputs.landpage == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: oracle
          java-version: 25
          cache: gradle
          cache-dependency-path: |
            ./*.gradle*
            ./**/gradle-wrapper.properties

      - name: Build
        run: ./gradlew ylcs-app:landpage:jsJar

  build-gallery:
    name: Build Rachel UI Gallery
    needs: changes
    if: ${{ needs.changes.outputs.gallery == 'true' }}
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: oracle
          java-version: 25
          cache: gradle
          cache-dependency-path: |
            ./*.gradle*
            ./**/gradle-wrapper.properties

      - name: Build
        run: ./gradlew ylcs-app:gallery:desktopJar
