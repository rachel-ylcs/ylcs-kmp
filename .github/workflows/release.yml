name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  package-android:
    name: Package Android
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: oracle
          java-version: 25
          cache: gradle
          cache-dependency-path: |
            ./*.gradle*
            ./**/gradle-wrapper.properties

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build
        run: ./gradlew ylcs-app:androidApp:androidArtifact

      - name: Upload
        uses: actions/upload-artifact@v7
        with:
          name: android
          path: outputs/*.apk

  package-ios:
    name: Package iOS
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: oracle
          java-version: 25
          cache: gradle
          cache-dependency-path: |
            ./*.gradle*
            ./**/gradle-wrapper.properties

      - name: Build
        run: |
          ./gradlew ylcs-app:app:portal:generateDummyFramework
          # xcodebuild build -workspace ./ylcs-app/iosApp/iosApp.xcworkspace -scheme iosApp
          xcodebuild archive -workspace ./ylcs-app/iosApp/iosApp.xcworkspace -scheme iosApp -archivePath ./outputs/iosApp
          # xcodebuild -exportArchive -archivePath ./outputs/iosApp.xcarchive -exportPath outputs/ylcs -exportOptionsPlist ./ylcs-app/iosApp/ExportOptions.plist
          mkdir -p outputs/Payload
          cp -r outputs/iosApp.xcarchive/Products/Applications/ylcs.app outputs/Payload/
          cd outputs
          zip -r "ylcs-ios.ipa" Payload

      - name: Upload
        uses: actions/upload-artifact@v7
        with:
          name: ios
          path: outputs/*.ipa

  package-windows:
    name: Package Windows
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: oracle
          java-version: 25
          cache: gradle
          cache-dependency-path: |
            ./*.gradle*
            ./**/gradle-wrapper.properties

      - name: Setup MSVC
        uses: TheMrMilchmann/setup-msvc-dev@v4
        with:
          arch: x64
          export-path-to-vs: VS_PATH

      - name: Build
        run: |
          ./gradlew ylcs-app:desktopApp:desktopJar
          ./gradlew ylcs-app:desktopApp:desktopArtifact

      - name: Upload
        uses: actions/upload-artifact@v7
        with:
          name: windows
          path: outputs/*.zip

  package-linux:
    name: Package Linux
    # 用太新的 Ubuntu 会导致 native 库链接的 glibc 版本过高，导致无法在较旧的 Linux 上运行
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: oracle
          java-version: 25
          cache: gradle
          cache-dependency-path: |
            ./*.gradle*
            ./**/gradle-wrapper.properties

      - name: Build
        run: |
          ./gradlew ylcs-app:desktopApp:desktopJar
          ./gradlew ylcs-app:desktopApp:desktopArtifact

      - name: Upload
        uses: actions/upload-artifact@v7
        with:
          name: linux
          path: outputs/*.zip

  package-macos:
    name: Package macOS
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: oracle
          java-version: 25
          cache: gradle
          cache-dependency-path: |
            ./*.gradle*
            ./**/gradle-wrapper.properties

      - name: Build
        run: |
          ./gradlew ylcs-app:desktopApp:desktopJar
          ./gradlew ylcs-app:desktopApp:desktopArtifact

      - name: Upload
        uses: actions/upload-artifact@v7
        with:
          name: macos
          path: outputs/*.zip

  package-web:
    name: Package Web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: oracle
          java-version: 25
          cache: gradle
          cache-dependency-path: |
            ./*.gradle*
            ./**/gradle-wrapper.properties

      - name: Build
        run: ./gradlew ylcs-app:webApp:webArtifact

      - name: Upload
        uses: actions/upload-artifact@v7
        with:
          name: web
          path: outputs/*.zip

  package-server:
    name: Package Server
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: oracle
          java-version: 25
          cache: gradle
          cache-dependency-path: |
            ./*.gradle*
            ./**/gradle-wrapper.properties

      - name: Build
        run: ./gradlew ylcs-app:server:serverArtifact

      - name: Upload
        uses: actions/upload-artifact@v7
        with:
          name: server
          path: outputs/*.jar

  package-modManager:
    name: Package Mod Manager
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: oracle
          java-version: 25
          cache: gradle
          cache-dependency-path: |
            ./*.gradle*
            ./**/gradle-wrapper.properties

      - name: Setup MSVC
        uses: TheMrMilchmann/setup-msvc-dev@v4
        with:
          arch: x64
          export-path-to-vs: VS_PATH

      - name: Build
        run: |
          ./gradlew ylcs-app:mod-manager:modManagerPublish

      - name: Upload
        uses: actions/upload-artifact@v7
        with:
          name: windows
          path: outputs/*.zip

  package-landpage:
    name: Package Landpage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: oracle
          java-version: 25
          cache: gradle
          cache-dependency-path: |
            ./*.gradle*
            ./**/gradle-wrapper.properties

      - name: Build
        run: ./gradlew ylcs-app:landpage:landpagePublish

      - name: Upload
        uses: actions/upload-artifact@v7
        with:
          name: web
          path: outputs/*.zip

  publish-release:
    name: Publish Release
    if: ${{ always() }}
    needs: [package-android, package-ios, package-windows, package-linux, package-macos, package-web, package-server, package-modManager, package-landpage]
    runs-on: ubuntu-latest
    permissions:
      contents: write # 发布 Release 需要写权限
    steps:
      - name: Generate Changelog
        uses: mikepenz/release-changelog-builder-action@v6
        id: changelog
        with:
          mode: "COMMIT"
          configurationJson: |
            {
              "template": "#{{CHANGELOG}}\n\n## 贡献者\n#{{CONTRIBUTORS}}",
              "categories": [
                {
                    "title": "## 新功能",
                    "labels": ["feat", "feature"]
                },
                {
                    "title": "## UI",
                    "labels": ["style", "ui"]
                },
                {
                    "title": "## 修复",
                    "labels": ["fix", "bug"]
                },
                {
                    "title": "## 优化&重构",
                    "labels": ["imporve", "perf", "refactor"]
                },
                {
                    "title": "## 文档",
                    "labels": ["docs", "doc"]
                },
                {
                    "title": "## 杂项",
                    "labels": ["build", "chore", "ci", "update", "revert", "rollback"]
                }
              ],
              "label_extractor": [
                {
                  "pattern": "^(build|chore|ci|docs?|feat|feature|fix|bug|imporve|perf|refactor|update|revert|rollback|style|ui){1}(\\([\\w\\-\\.]+\\))?(!)?:(.*)",
                  "on_property": "title",
                  "target": "$1"
                }
              ]
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download Artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: 银临茶舍 ${{ github.ref_name }} 发布🎉🎉🎉
          body: ${{ steps.changelog.outputs.changelog }}
          draft: false
          prerelease: false
          preserve_order: true
          files: |
            artifacts/android/*
            artifacts/ios/*
            artifacts/windows/*
            artifacts/macos/*
            artifacts/linux/*
            artifacts/web/*
            artifacts/server/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}